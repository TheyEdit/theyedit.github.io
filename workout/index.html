          const avgTxt = metric === "steps" ? `${(avg / 1000).toFixed(1)}k` : metric === "water" ? `${Math.round(avg)} ml` : Math.round(avg * 10) / 10;

}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [mem, setMem] = useState(DEFAULT);
  const [day, setDay] = useState(1);
  const [tab, setTabState] = useState(() => { try { return localStorage.getItem("gg:tab") || "workout"; } catch (e) { return "workout"; } });
  const setTab = (t) => { setTabState(t); try { localStorage.setItem("gg:tab", t); } catch (e) {} };   // remembered per device, not synced
  const [sync, setSync] = useState(null);          // {url,key,code} or null
  const [syncMsg, setSyncMsg] = useState("");       // human-readable status
  const [syncLocked, setSyncLocked] = useState(CIPHER_ACTIVE);   // baked sync waiting for the password on this device
  const [syncLog, setSyncLog] = useState([]);       // verbose, on-screen debug log
  const pushTimer = useRef(null);
  const memRef = useRef(DEFAULT);
  const liveRef = useRef(null);
  const shaRef = useRef(null);
  const syncReady = useRef(false);
  const reconciling = useRef(false);   // serialize pull/push so they can't race each other
  const quietRef = useRef(0);   // suppress push echoes right after adopting a remote copy
  const liveClearedRef = useRef(false);   // true only when WE intentionally ended the session (finish/discard/day-switch)
  const syncedLiveSig = useRef("null");   // signature of the live session as last synced — stops re-pushing an adopted session
  const lastFinishRef = useRef(null);     // { key, at } of the most recently finished set — used to measure REAL rest taken

  // mirror the module-level sync debug ring buffer into React state so it renders
  useEffect(() => { setSyncLog(SYNCLOG.slice()); SYNCLOG_NOTIFY = (lines) => setSyncLog(lines); return () => { SYNCLOG_NOTIFY = null; }; }, []);
  const now = new Date();
  const today = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  // load memory once
  useEffect(() => {
    let alive = true;
    (async () => {
      const s = hasStore ? await loadState() : null;
      if (!alive) return;
      const m = migrateMem(s);
      setMem(m); memRef.current = m;
      // Migration: an existing local copy with no change-clock yet (legacy / pre-sync data)
      // must count as unsynced content so reconcile seeds it to the repo instead of risking
      // it being silently overwritten by the other device.
      if (s && hasStore && !(await localTs())) await bumpChange();
      setDay(m.lastDay ? nextDayId(m.lastDay) : 1);
      const live = hasStore ? await loadLive() : null;
      const liveOk = live && Array.isArray(live.done) && (live.done.length > 0 || live.active);
      if (liveOk && Date.now() - (live.ts || 0) < 86400000) { setPending(live); liveRef.current = live; }
      const saved = hasStore ? await loadSyncCfg() : null;
      let cfg = saved && saved.repo && saved.token ? saved : null;   // a prior unlock persisted the cfg here → no password needed again
      if (!cfg && CIPHER_ACTIVE) {                       // first time on this device: decrypt the token with the saved password
        const pw = hasStore ? await LS.get(PWKEY) : null;
        if (pw) { try { cfg = { ...BAKED_SYNC, token: await decryptToken(SYNC_CIPHER, pw) }; if (hasStore) await saveSyncCfg(cfg); } catch (e) {} }
      }
      if (cfg && cfg.repo && cfg.token) {
        if (alive) setSyncLocked(false);   // we have a working config (saved or decrypted) → not locked
        setSync(cfg);
        syncReady.current = true;   // reconcile() may push genuine local changes during boot
        await reconcile(cfg, "boot", true);
      }
      setLoaded(true);
      syncReady.current = true;   // only start auto-pushing after the initial reconcile
    })();
    return () => { alive = false; };
  }, []);

  // adopt a pulled {mem, live} blob into local state + storage.
  // After adopting we set BOTH localTs and syncedTs to the remote ts, so this device
  // now reports "no unsynced changes" and won't immediately push the copy back (echo).
  const applyBlob = async (blob, sha, ts, setTagToo) => {
    const rmem = migrateMem(blob && blob.mem ? blob.mem : blob);     // tolerate + upgrade older mem-only / v1 files
    const rlive = blob && blob.mem ? blob.live : null;
    const adoptTs = ts || Date.now();
    quietRef.current = Date.now() + 1800;
    shaRef.current = sha || shaRef.current;
    memRef.current = rmem; setMem(rmem);
    await LS.set(KEY, rmem);
    await LS.set(TSKEY, adoptTs);        // local "change" clock == what we just adopted
    await setSyncedTs(adoptTs);          // ...and we are in sync with it
    if (setTagToo) setDay(rmem.lastDay ? nextDayId(rmem.lastDay) : 1);   // adopted: suggest next day (auto-resume overrides to the live session's day if present)
    const liveOk = rlive && Array.isArray(rlive.done) && (rlive.done.length > 0 || rlive.active);
    if (liveOk) { liveRef.current = rlive; if (hasStore) await LS.set(LIVE, rlive); setPending(rlive); }
    else { liveRef.current = null; if (hasStore) await LS.del(LIVE); setPending(null); }
    liveClearedRef.current = false;                 // we adopted remote state, not a local clear
    syncedLiveSig.current = liveSig(liveOk ? rlive : null);   // remember it so we don't re-push this adopted session
  };

  // push this device's current copy to remote. `remote` = the just-pulled remote (from reconcile) so we can
  // MERGE the in-progress session: never carry a null/stale live over a remote session unless WE ended it.
  const pushLocal = async (cfg, reason, remote) => {
    const lt = await localTs();
    const remoteLive = remote && remote.data ? remote.data.live : null;
    let live = liveRef.current;
    if (!live && !liveClearedRef.current && remoteLive && Array.isArray(remoteLive.done) && (remoteLive.done.length > 0 || remoteLive.active)) {
      live = remoteLive; liveRef.current = remoteLive; if (hasStore) await LS.set(LIVE, remoteLive); setPending(remoteLive);   // adopt the other device's session locally too, so it shows here as well
    }
    if (liveClearedRef.current) live = null;
    const out = await REMOTE.push(cfg, { mem: memRef.current, live }, shaRef.current, lt);
    if (out.conflict) {                              // someone wrote a newer copy mid-flight → adopt it instead of clobbering
      await applyBlob(out.remote.data, out.remote.sha, out.remote.ts, false);
      dbg(`pushLocal(${reason}): conflict → adopted remote instead of overwriting`);
      return out;
    }
    shaRef.current = out.sha || shaRef.current;
    await setSyncedTs(out.ts);            // we are now in sync at the ts we just wrote
    liveClearedRef.current = false;
    syncedLiveSig.current = liveSig(live);
    return out;
  };

  // THE one decision point used by boot / connect / focus / poll / sync-now / debounced save.
  // Compares remoteTs and localTs against the *last synced ts* and logs which branch it takes:
  //   adopt — remote has changes we haven't seen (and it's at least as new as ours)
  //   push  — we have genuine unsynced local changes that are newer
  //   skip  — already in sync (or remote is just our own last push echoing back)
  const reconcile = async (cfg, reason, setTagToo) => {
    cfg = cfg || sync; if (!cfg) return;
    if (reconciling.current) { dbg(`reconcile(${reason}) skipped — another reconcile in flight`); return; }
    reconciling.current = true;
    try {
      const res = await REMOTE.pull(cfg);
      const lt = await localTs();
      const st = await syncedTs();
      const remoteTs = res.ts || 0;
      const hasRemote = !!res.data;
      const remoteNewer = hasRemote && remoteTs > st;     // remote moved since we last synced
      const localNewer = lt > st;                         // we changed since we last synced
      dbg(`reconcile(${reason}): localTs=${tsLabel(lt)} syncedTs=${tsLabel(st)} remoteTs=${tsLabel(remoteTs)} → remoteNewer=${remoteNewer} localNewer=${localNewer}`);

      if (remoteNewer && (!localNewer || remoteTs > lt)) {     // strictly-newer remote wins; a tie keeps our local edit (push it)
        await applyBlob(res.data, res.sha, remoteTs, setTagToo);
        dbg(`reconcile(${reason}): ADOPT remote (sha=${shortSha(res.sha)})`);
        setSyncMsg("pulled latest · " + new Date().toLocaleTimeString());
      } else if (localNewer) {
        shaRef.current = res.sha || shaRef.current;       // adopt latest sha before writing
        const out = await pushLocal(cfg, reason, res);     // pass remote so live-merge can preserve the other device's session
        dbg(`reconcile(${reason}): ${out.conflict ? "PUSH→conflict, adopted" : "PUSH local (wroteTs=" + tsLabel(out.ts) + " sha=" + shortSha(out.sha) + ")"}`);
        setSyncMsg((out.conflict ? "pulled latest · " : "pushed · ") + new Date().toLocaleTimeString());
      } else {
        shaRef.current = res.sha || shaRef.current;
        if (hasRemote && remoteTs > st) await setSyncedTs(remoteTs);
        dbg(`reconcile(${reason}): SKIP — in sync`);
        setSyncMsg("up to date · " + new Date().toLocaleTimeString());
      }
    } catch (e) {
      dbg(`reconcile(${reason}): ERROR ${e.message}`);
      setSyncMsg("sync error: " + e.message);
    } finally {
      reconciling.current = false;
    }
  };

  // debounced local→remote: pull-then-decide (via reconcile) so a save can't blind-overwrite the other device.
  const schedulePush = () => {
    if (!sync || !syncReady.current || Date.now() < quietRef.current) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async () => {
      if (reconciling.current) { schedulePush(); return; }   // retry after the in-flight reconcile
      const lt = await localTs(); const st = await syncedTs();
      if (lt <= st) { dbg(`schedulePush: nothing unsynced (localTs=${tsLabel(lt)} ≤ syncedTs=${tsLabel(st)}) — skip`); return; }
      await reconcile(sync, "debounced-save", false);
    }, 3500);
  };

  useEffect(() => { memRef.current = mem; schedulePush(); }, [mem]);

  // returning to the app — and a light poll while visible — pulls whatever the other device left
  useEffect(() => {
    if (!sync) return;
    const onFocus = () => { if (document.visibilityState !== "hidden") reconcile(sync, "focus", false); };
    // leaving the app (background/close): flush any unsynced local changes NOW so the other device
    // sees them on its next open, instead of waiting out the debounce.
    const flush = async () => { try { const lt = await localTs(), st = await syncedTs(); if (lt > st && !reconciling.current) { if (pushTimer.current) clearTimeout(pushTimer.current); await reconcile(sync, "flush-on-hide", false); } } catch (e) {} };
    const onVis = () => { if (document.visibilityState === "visible") reconcile(sync, "visibility", false); else flush(); };
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("pagehide", flush);
    const poll = setInterval(() => { if (document.visibilityState === "visible") reconcile(sync, "poll", false); }, 20000);
    return () => { window.removeEventListener("focus", onFocus); document.removeEventListener("visibilitychange", onVis); window.removeEventListener("pagehide", flush); clearInterval(poll); };
  }, [sync]);

  const connectSync = async (cfg) => {
    await saveSyncCfg(cfg); setSync(cfg); shaRef.current = null; setSyncMsg("connecting…");
    dbg(`connect: repo=${cfg.repo} path=${cfg.path} branch=${cfg.branch || "main"}`);
    syncReady.current = true;
    await reconcile(cfg, "connect", true);
  };
  const disconnectSync = async () => { await LS.del(SYNCKEY); setSync(null); shaRef.current = null; setSyncMsg(""); dbg("disconnected (config cleared on this device)"); };
  // baked sync: decrypt the token with the entered password, remember it on this device, then sync
  const unlockSync = async (password) => {
    setSyncMsg("unlocking…");
    try {
      const token = await decryptToken(SYNC_CIPHER, password);
      const cfg = { ...BAKED_SYNC, token };
      if (hasStore) { await LS.set(PWKEY, password); await saveSyncCfg(cfg); }   // persist cfg too → never asks for the password again on this device
      shaRef.current = null; setSync(cfg); setSyncLocked(false); syncReady.current = true;
      dbg("sync unlocked with password");
      await reconcile(cfg, "unlock", true);
      setSyncMsg("synced · " + new Date().toLocaleTimeString());
    } catch (e) { dbg("unlock failed: wrong password"); setSyncMsg("wrong password"); }
  };
  const syncNow = async () => { if (!sync) return; setSyncMsg("syncing…"); await reconcile(sync, "sync-now", false); };
  // manual force-refresh button: pull the shared state right now
  const forceSync = async () => { if (!sync) return; setSyncMsg("refreshing…"); await reconcile(sync, "manual-refresh", false); };

  const plan = useMemo(() => {
    if (!loaded) return [];
    return buildDayPlan(day, mem);
  }, [day, mem, loaded]);

  const estMin = useMemo(() => { let t = 0; plan.forEach((it) => { it.sets.forEach((s) => { t += SET_EXEC + s.rest; }); t += TRANSITION; }); return Math.round(t / 60); }, [plan]);

  const [active, setActive] = useState(null);
  const [cue, setCue] = useState("");
  const [rest, setRest] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [done, setDone] = useState(() => new Set());
  const [logs, setLogs] = useState({});
  const [summary, setSummary] = useState(null);
  const [openInfo, setOpenInfo] = useState(null);
  const [confirm, setConfirm] = useState(null);   // null | "finish" | "reset"
  const [pending, setPending] = useState(null);    // saved in-progress session offered for resume
  const cursors = useRef({});
  const audioCtx = useRef(null);
  const skipNextReset = useRef(false);

  const primeAudio = () => { try { const AC = window.AudioContext || window.webkitAudioContext; if (AC) { const ctx = audioCtx.current || (audioCtx.current = new AC()); if (ctx.state === "suspended") ctx.resume(); } } catch (e) {} };
  const fireAlert = useCallback(() => {
    try { if (navigator.vibrate) navigator.vibrate([130, 70, 130]); } catch (e) {}
    try {
      const ctx = audioCtx.current; if (!ctx) return;
      const beep = (t, f) => { const o = ctx.createOscillator(), g = ctx.createGain(); o.type = "sine"; o.frequency.value = f; g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.35, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t + 0.34); };
      const t0 = ctx.currentTime; beep(t0, 880); beep(t0 + 0.4, 1175);
    } catch (e) {}
  }, []);

  useEffect(() => {
    if (skipNextReset.current) { skipNextReset.current = false; return; }
    const init = {};
    plan.forEach((it, ei) => it.sets.forEach((s, si) => { init[`${ei}-${si}`] = { weight: s.load, reps: s.repsNum }; }));
    setLogs(init); setActive(null); setCue(""); setRest(null); setDone(new Set()); cursors.current = {}; setOpenInfo(null);
  }, [plan]);

  const busy = active !== null || rest !== null;
  const sessionStarted = active !== null || rest !== null || done.size > 0;
  const setVariant = async (key, idx) => { const nm = { ...mem, [key + "Choice"]: idx }; if (hasStore) await saveState(nm); setMem(nm); };
  const workDoneCount = useMemo(() => [...done].length, [done]);

  const advance = useCallback(() => {
    if (!active) return;
    const exIdx = Number(active.split("-")[0]);
    const item = plan[exIdx];
    const n = cursors.current[exIdx] ?? 0;
    if (n >= item.order.length) { setCue(item.ex.cues[item.order[item.order.length - 1]]); return; }
    setCue(item.ex.cues[item.order[n]]);
    cursors.current[exIdx] = n + 1;
  }, [active, plan]);

  useEffect(() => { if (!active) return; advance(); const id = setInterval(advance, 12000); return () => clearInterval(id); }, [active, advance]);

  // clock-based rest: remaining is computed from an absolute end time, so a locked/backgrounded
  // screen can't desync it — on return to foreground we recompute and fire if it already elapsed.
  useEffect(() => {
    if (!rest) return;
    let stopped = false;
    const check = () => {
      if (stopped) return;
      const left = Math.round((rest.endAt - Date.now()) / 1000);
      if (left <= 0) { fireAlert(); const k = rest.key, now = Date.now();
        setLogs((L) => ({ ...L, [k]: { ...(L[k] || {}), restEndedVia: "timer", restAppElapsed: L[k]?.finishedAt ? Math.round((now - L[k].finishedAt) / 1000) : rest.total } }));
        setDone((d) => new Set(d).add(rest.key)); setRest(null); return; }
      setRestLeft(left);
    };
    check();
    const id = setInterval(check, 500);
    const onVis = () => { if (document.visibilityState === "visible") check(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("focus", onVis);
    return () => { stopped = true; clearInterval(id); document.removeEventListener("visibilitychange", onVis); window.removeEventListener("focus", onVis); };
  }, [rest, fireAlert]);

  // autosave the live session at each set boundary so a lock/refresh/device-switch can be resumed
  useEffect(() => {
    if (!loaded) return;
    const started = done.size > 0 || active !== null;
    const liveObj = started ? { day, logs, done: [...done], active, ts: Date.now() } : (pending || null);
    liveRef.current = liveObj;
    if (hasStore && started) saveLive(liveObj);
    // Only mark the device "dirty" (bump the change clock + push) when the session GENUINELY changed —
    // not when this effect re-fires because we just ADOPTED a session from another device. Comparing the
    // content signature to the last-synced one stops the two devices ping-ponging the same session forever.
    const sig = liveSig(liveObj);
    if (sig !== syncedLiveSig.current) { bumpChange().then(schedulePush); }
    else { schedulePush(); }
  }, [done, active, loaded, pending]);

  const workKeys = useMemo(() => { const ks = []; plan.forEach((it, ei) => { if (it.ex.optional) return; it.sets.forEach((s, si) => { if (s.kind === "work") ks.push(`${ei}-${si}`); }); }); return ks; }, [plan]);
  const workTotal = workKeys.length;
  const workDone = useMemo(() => workKeys.filter((k) => done.has(k)).length, [workKeys, done]);

  const stepW = (key, d, set) => setLogs((L) => {
    const cur = L[key]?.weight ?? set.load;
    const nv = stepPlate(cur, d);
    const next = { ...L, [key]: { weight: nv, reps: L[key]?.reps ?? set.repsNum } };
    const [ei] = key.split("-").map(Number);
    const it = plan[ei];
    if (it && it.ex.type === "rpt" && set.kind === "work" && set.label === "1") {
      const work = it.sets.map((s, idx) => ({ s, idx })).filter((x) => x.s.kind === "work");
      const loads = rptLoads(nv);
      work.forEach(({ s, idx }, wi) => {
        if (wi === 0) return;
        const k2 = `${ei}-${idx}`;
        const curW = L[k2]?.weight ?? s.load;
        if (curW === s.load) next[k2] = { weight: loads[wi], reps: L[k2]?.reps ?? s.repsNum };  // only cascade sets you haven't hand-edited
      });
    }
    return next;
  });
  const stepR = (key, d, set) => setLogs((L) => { const cur = L[key]?.reps ?? set.repsNum; return { ...L, [key]: { ...(L[key] || {}), weight: L[key]?.weight ?? set.load, reps: Math.max(0, cur + d) } }; });
  const setEffort = (key, e) => setLogs((L) => ({ ...L, [key]: { ...(L[key] || {}), e: L[key]?.e === e ? undefined : e } }));
  const startSet = (key) => { if (!busy) { primeAudio();
    const now = Date.now();
    const lf = lastFinishRef.current;
    if (lf && lf.key !== key) setLogs((L) => (L[lf.key] && L[lf.key].restActual == null ? { ...L, [lf.key]: { ...L[lf.key], restActual: Math.round((now - lf.at) / 1000) } } : L));   // real rest since the last set finished
    setLogs((L) => ({ ...L, [key]: { ...(L[key] || {}), startedAt: now } }));
    setActive(key); setOpenInfo(null); } };
  const finishSet = (set) => { const key = active; const now = Date.now(); primeAudio();
    setLogs((L) => ({ ...L, [key]: { ...(L[key] || {}), finishedAt: now, restPrescribed: set.rest } }));
    lastFinishRef.current = { key, at: now };
    setActive(null); setCue(""); setRestLeft(set.rest); setRest({ key, endAt: now + set.rest * 1000, total: set.rest }); setOpenInfo(null); };
  const skipRest = () => { const key = rest.key, now = Date.now();
    setLogs((L) => ({ ...L, [key]: { ...(L[key] || {}), restEndedVia: "skip", restAppElapsed: L[key]?.finishedAt ? Math.round((now - L[key].finishedAt) / 1000) : null } }));
    setDone((d) => new Set(d).add(rest.key)); setRest(null); setOpenInfo(null); };
  const addRest = () => setRest((r) => (r ? { ...r, endAt: r.endAt + 30000, total: r.total + 30 } : null));
  const cancelSet = () => { setActive(null); setCue(""); setOpenInfo(null); };
  const undoSet = (key) => setDone((dn) => { const n = new Set(dn); n.delete(key); return n; });

  /* progression engine — double progression from what you actually logged (reps + effort) */
  const finishWorkout = async () => {
    const stamp = new Date().toISOString();
    const prevSnap = mem.lastByDay?.[day] || null;
    const newTargets = { ...(mem.targets || {}) };
    const newWeights = { ...(mem.weights || {}) };
    const newStalls = { ...(mem.stalls || {}) };
    const recentCues = { ...mem.recentCues };
    const newHistory = { ...(mem.history || {}) };
    const newSetHistory = { ...(mem.setHistory || {}) };
    const changes = [];
    const snap = { date: stamp, lifts: {} };

    plan.forEach((item, exIdx) => {
      const name = item.ex.name;
      const work = item.sets.map((s, si) => ({ s, si })).filter((x) => x.s.kind === "work");
      const range = work[0]?.s.range || item.ex.range;
      const loggedKeys = work.map((x) => `${exIdx}-${x.si}`).filter((k) => done.has(k));
      const logged = loggedKeys.map((k) => ({ w: logs[k].weight, r: logs[k].reps, e: logs[k].e }));
      const c = cursors.current[exIdx] ?? 0; recentCues[name] = item.order.slice(0, c);   // cue rotation memory
      if (!logged.length) return;                                                          // skip lifts you didn't log
      const target = newTargets[name] || { load: item.target.load, reps: range[0] };
      const res = nextPrescription({ range, target, work: logged, last: prevSnap?.lifts?.[name]?.sets || null, stall: newStalls[name] || 0 });
      newTargets[name] = { load: res.load, reps: res.reps };
      newWeights[name] = res.load;
      newStalls[name] = res.stall;
      changes.push({ name, decision: res.decision, fromLoad: target.load, toLoad: res.load, fromReps: target.reps, toReps: res.reps, single: !!item.ex.single });
      const single = !!item.ex.single;
      const tonnage = logged.reduce((a, s) => a + s.w * s.r * (single ? 2 : 1), 0);
      const topS = logged.reduce((b, s) => (!b || e1rm(s.w, s.r) > e1rm(b.w, b.r) ? s : b), null);
      snap.lifts[name] = { sets: logged, top: { w: topS.w, r: topS.r, e: topS.e }, tonnage };
      newHistory[name] = [...(newHistory[name] || []), { t: stamp, w: topS.w, r: topS.r }].slice(-40);
      const sh = { ...(newSetHistory[name] || {}) };
      work.forEach((x) => { const k = `${exIdx}-${x.si}`; if (done.has(k)) sh[x.s.label] = [...(sh[x.s.label] || []), { t: stamp, w: logs[k].weight, r: logs[k].reps, e: logs[k].e }].slice(-30); });
      newSetHistory[name] = sh;
    });

    const assessment = assess(snap.lifts, prevSnap?.lifts || null);
    const newLastByDay = { ...(mem.lastByDay || {}), [day]: snap };
    const lastChanges = {}; changes.forEach((c) => { lastChanges[c.name] = c; });
    // ground-truth audit: the REAL timings of this session (rest taken vs prescribed, skip-early vs ring, etc.)
    const isoOrNull = (ms) => (ms ? new Date(ms).toISOString() : null);
    const auditSets = [];
    plan.forEach((item, exIdx) => {
      const work = item.sets.map((s, si) => ({ s, si })).filter((x) => x.s.kind === "work");
      work.forEach((x) => { const k = `${exIdx}-${x.si}`; if (done.has(k)) { const lg = logs[k] || {};
        auditSets.push({ ex: item.ex.name, set: x.s.label, w: lg.weight, r: lg.reps, e: lg.e || null,
          startedAt: isoOrNull(lg.startedAt), finishedAt: isoOrNull(lg.finishedAt),
          restPrescribed: lg.restPrescribed ?? null, restEndedVia: lg.restEndedVia ?? null,
          restAppElapsed: lg.restAppElapsed ?? null, restActual: lg.restActual ?? null }); } });
    });
    const firstStart = auditSets.map((s) => s.startedAt).filter(Boolean).sort()[0] || stamp;
    const auditRec = { day, date: stamp, startedAt: firstStart, finishedAt: stamp, durationS: Math.round((Date.parse(stamp) - Date.parse(firstStart)) / 1000), sets: auditSets };
    const newAudit = [...(mem.audit || []), auditRec].slice(-20);
    const newMem = { ...mem, version: 2, lastDay: day, sessionCount: (mem.sessionCount || 0) + 1, weights: newWeights, targets: newTargets, stalls: newStalls, lastByDay: newLastByDay, audit: newAudit, recentCues, lastChanges, history: newHistory, setHistory: newSetHistory };
    if (hasStore) { await saveState(newMem); await clearLive(); }
    liveRef.current = null; liveClearedRef.current = true; syncedLiveSig.current = "null"; lastFinishRef.current = null;   // session genuinely finished → propagate the clear
    setPending(null);
    setSummary({ day, changes, assessment });
    setMem(newMem);
    setDay(nextDayId(day));
    setOpenInfo(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const resumeSession = () => {
    if (!pending) return;
    if (pending.day !== day) { skipNextReset.current = true; setDay(pending.day); }
    setLogs(pending.logs || {});
    setDone(new Set(pending.done || []));
    setPending(null);
  };
  const discardSession = async () => { if (hasStore) await clearLive(); liveRef.current = null; liveClearedRef.current = true; setPending(null); };
  // Auto-restore an in-progress session (saved locally, or just pulled from another device) into the
  // live view — one seamless session, no "Resume" click. This is what makes a refresh (here or on
  // another device) show your logged sets immediately, like a shared doc.
  useEffect(() => { if (loaded && pending) resumeSession(); }, [loaded, pending]);

  const setBody = async (patch) => { const body = { ...(mem.body || {}), ...patch }; const nm = { ...mem, body }; if (hasStore) await saveState(nm); setMem(nm); };
  const setUnit = async (u) => { const nm = { ...mem, unit: u }; if (hasStore) await saveState(nm); setMem(nm); };

  // ── diet handlers (each persists locally + rides the existing sync, like setBody) ──
  const persistMem = async (nm) => { if (hasStore) await saveState(nm); setMem(nm); };
  const nutOf = () => mem.nutrition || DEFAULT.nutrition;
  const dayOf = (nut, k) => ({ ...blankDay(), ...(nut.days[k] || {}) });
  const setNutGoals = async (patch) => { const nut = nutOf(); await persistMem({ ...mem, nutrition: { ...nut, goals: { ...nut.goals, ...patch } } }); };
  const logFood = async (food, dk) => { const nut = nutOf(), k = dk || todayKey(), d = dayOf(nut, k);
    const e = { id: uid(), label: food.label || "food", kcal: +food.kcal || 0, protein: +food.protein || 0, carbs: +food.carbs || 0, fat: +food.fat || 0, t: new Date().toISOString() };
    const nd = { ...d, kcal: d.kcal + e.kcal, protein: d.protein + e.protein, carbs: d.carbs + e.carbs, fat: d.fat + e.fat, entries: [...d.entries, e] };
    await persistMem({ ...mem, nutrition: { ...nut, days: pruneDays({ ...nut.days, [k]: nd }) } }); };
  const removeEntry = async (id, dk) => { const nut = nutOf(), k = dk || todayKey(), d = dayOf(nut, k); const e = d.entries.find((x) => x.id === id); if (!e) return;
    const nd = { ...d, kcal: d.kcal - e.kcal, protein: d.protein - e.protein, carbs: d.carbs - e.carbs, fat: d.fat - e.fat, entries: d.entries.filter((x) => x.id !== id) };
    await persistMem({ ...mem, nutrition: { ...nut, days: { ...nut.days, [k]: nd } } }); };
  const addFood = async (food) => { const nut = nutOf(); const f = { id: uid(), label: food.label, kcal: +food.kcal || 0, protein: +food.protein || 0, carbs: +food.carbs || 0, fat: +food.fat || 0 };
    await persistMem({ ...mem, nutrition: { ...nut, foods: [...(nut.foods || []), f] } }); };
  const removeFood = async (id) => { const nut = nutOf(); await persistMem({ ...mem, nutrition: { ...nut, foods: (nut.foods || []).filter((f) => f.id !== id) } }); };
  const setSteps = async (n, dk) => { const nut = nutOf(), k = dk || todayKey(), d = dayOf(nut, k); const nd = { ...d, steps: Math.max(0, Math.round(+n || 0)) };
    await persistMem({ ...mem, nutrition: { ...nut, days: pruneDays({ ...nut.days, [k]: nd }) } }); };
  const addWater = async (ml, dk) => { const amt = Math.round(+ml || 0); if (!amt) return; const nut = nutOf(), k = dk || todayKey(), d = dayOf(nut, k);
    const w = { id: uid(), ml: amt, t: new Date().toISOString() }; const nd = { ...d, water: Math.max(0, d.water + amt), waterEntries: [...d.waterEntries, w] };
    await persistMem({ ...mem, nutrition: { ...nut, days: pruneDays({ ...nut.days, [k]: nd }) } }); };
  const removeWaterEntry = async (id, dk) => { const nut = nutOf(), k = dk || todayKey(), d = dayOf(nut, k); const e = d.waterEntries.find((x) => x.id === id); if (!e) return;
    const nd = { ...d, water: Math.max(0, d.water - e.ml), waterEntries: d.waterEntries.filter((x) => x.id !== id) };
    await persistMem({ ...mem, nutrition: { ...nut, days: { ...nut.days, [k]: nd } } }); };
  const setSleepToday = async (bed, wake, dk) => { const sl = mem.sleep || DEFAULT.sleep, k = dk || todayKey();
    await persistMem({ ...mem, sleep: { ...sl, days: pruneDays({ ...sl.days, [k]: { bed, wake } }) } }); };
  const setSleepDefault = async (bed, wake) => { const sl = mem.sleep || DEFAULT.sleep; await persistMem({ ...mem, sleep: { ...sl, def: { bed, wake } } }); };
  const logBW = async () => {
    const body = { ...(mem.body || {}) };
    if (!body.bw) return;
    const today = new Date().toISOString().slice(0, 10);
    const hist = (body.bwHist || []).filter((e) => e.t.slice(0, 10) !== today);
    body.bwHist = [...hist, { t: new Date().toISOString(), w: body.bw }].slice(-60);
    const nm = { ...mem, body }; if (hasStore) await saveState(nm); setMem(nm);
  };

  const resetMemory = async () => { if (hasStore) { await clearState(); await clearLive(); } setMem(migrateMem(null)); setDay(1); setSummary(null); setPending(null); setConfirm(null); };

  const body = mem.body || {};
  const unit = mem.unit || "lb";
  const bw = body.bw || 0;
  const bwHist = body.bwHist || [];
  const bwDelta = (() => {
    if (bwHist.length < 2) return null;
    const last = bwHist[bwHist.length - 1].w;
    const cutoff = Date.now() - 30 * 864e5;
    const prior = [...bwHist].reverse().find((e) => new Date(e.t).getTime() <= cutoff) || bwHist[0];
    return Math.round((last - prior.w) * 10) / 10;
  })();
  const stdRows = STD.map((s) => {
    const ex = ALL_EX.find((e) => e.name === s.name);
    const hist = mem.history?.[s.name] || [];
    const bestE = hist.length ? Math.max(...hist.map((h) => e1rm(h.w, h.r))) : (ex ? e1rm(mem.weights?.[s.name] ?? baseWeight(ex), 5) : 0);
    const pair = fiveRM(bestE) * 2;
    const ratio = bw ? pair / bw : 0;
    let tier = -1; s.ratios.forEach((r, i) => { if (ratio >= r) tier = i; });
    const nextIdx = Math.min(tier + 1, 2);
    const top = tier >= 2;
    const prevRatio = tier >= 0 ? s.ratios[tier] : 0;
    const nextRatio = s.ratios[nextIdx];
    const prog = top ? 1 : Math.max(0, Math.min(1, (ratio - prevRatio) / (nextRatio - prevRatio)));
    const nextTargetPair = Math.round((bw ? nextRatio * bw : 0));
    return { name: s.name, label: s.label, pair: Math.round(pair), ratio, tier, prog, nextTier: top ? null : TIERS[nextIdx], nextTargetPair, ceiling: nextTargetPair / 2 > 90, hasData: hist.length > 0 };
  });
  const waistPct = body.waist && body.height ? body.waist / body.height : 0;
  let waistTier = -1; WAIST_STD.forEach((r, i) => { if (waistPct > 0 && waistPct <= r) waistTier = i; });

  if (!loaded) return (
    <div className="flex min-h-screen w-full items-center justify-center" style={{ background: C.bg }}>
      <span className="font-mono text-xs uppercase tracking-[0.2em]" style={{ color: C.ashDim }}>loading your program…</span>
    </div>
  );

  return (
    <div className="min-h-screen w-full" style={{ background: C.bg, color: C.bone }}>
      <style>{`@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
        @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
        .ggwrap{position:relative;width:140px;height:140px;margin:0 auto}
        .ggfig{position:absolute;inset:0}
        .ggground{position:absolute;left:30px;right:30px;bottom:14px;height:2px;background:#2A2418;border-radius:2px}
        .gglegs,.ggbody{position:absolute;left:70px;top:96px;width:0;height:0;transform-origin:0 0}
        .ggleg{position:absolute;left:0;top:0;width:3px;height:30px;background:#6E5A1E;border-radius:2px;transform-origin:top center}
        .ggleg.b{transform:rotate(13deg)}.ggleg.f{transform:rotate(-13deg)}

                            <button onClick={addRest} aria-label="add 30 seconds rest" className="rounded-full border px-3 py-1 font-mono text-[11px] active:scale-95" style={{ borderColor: C.edge, color: C.ash }}>+30s</button>
                            <button onClick={skipRest} aria-label="skip rest" className="flex items-center gap-1 rounded-full border px-3 py-1 font-mono text-[11px] active:scale-95" style={{ borderColor: C.edge, color: C.ash }}><SkipForward size={11} /> Skip</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <p className="mt-3 font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}>
                {item.ex.type === "rpt" ? "reverse pyramid · −10% per set · rest " : "straight sets · rest "}{fmtRest(item.ex.rest)}
                {exIdx === 0 && item.ex.type === "rpt" ? " · warm-up ramp first" : exIdx === 1 && item.ex.type === "rpt" ? " · one ramp set" : ""}
              </p>
            </div>
          );})}
        </div>

        {/* finish + progress */}
        {confirm === "finish" ? (
          <div className="mt-6 rounded-2xl border p-4" style={{ borderColor: C.activeEdge, background: "#1A1609", animation: "fade .3s ease-out" }}>
            <p className="text-[13px] leading-relaxed" style={{ color: C.bone }}>Finish Day {day}? This saves your {workDone} logged set{workDone === 1 ? "" : "s"}, applies progression, and advances to the next day.</p>
            <div className="mt-3 flex gap-2">
              <button onClick={() => setConfirm(null)} className="flex-1 rounded-xl border py-3 font-mono text-xs uppercase tracking-wider" style={{ borderColor: C.edge, color: C.ash }}>Cancel</button>
              <button onClick={() => { setConfirm(null); finishWorkout(); }} className="flex flex-1 items-center justify-center gap-2 rounded-xl py-3 font-mono text-xs font-bold uppercase tracking-wider" style={{ background: C.gold, color: C.bg }}><Save size={15} /> Finish &amp; save</button>
            </div>
          </div>
        ) : (
          <button onClick={() => workDoneCount > 0 && setConfirm("finish")} disabled={workDoneCount === 0}
            className="mt-6 flex w-full items-center justify-center gap-2 rounded-2xl py-4 font-mono text-sm font-bold uppercase tracking-wider"
            style={{ background: workDoneCount === 0 ? C.card : C.gold, color: workDoneCount === 0 ? C.ashDim : C.bg, opacity: workDoneCount === 0 ? 0.6 : 1 }}>
            <Save size={16} /> Finish workout · save & progress
          </button>
        )}

        <ProgressChart mem={mem} />

        <div className="mt-6 rounded-2xl border p-5" style={{ background: C.card, borderColor: C.edge }}>
          <span className="font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: C.ash }}>Strength standards</span>

          {bw ? (
            <p className="mt-2 font-mono text-[11px]" style={{ color: C.ash }}>bodyweight <span style={{ color: C.bone }}>{unit === "kg" ? Math.round(bw * KG * 10) / 10 : bw} {uw(unit)}</span> <span style={{ color: C.ashDim }}>· edit in the Diet tab</span></p>
          ) : null}

          {!bw ? (
            <p className="mt-4 text-[12.5px] leading-relaxed" style={{ color: C.ash }}>Set your bodyweight in the <span style={{ color: C.gold }}>Diet</span> tab to see where your lifts land against the Good / Great / Godlike standards — relative strength is the program's whole scorecard.</p>
          ) : (
            <div className="mt-4 space-y-3">
              {stdRows.map((r) => (
                <div key={r.name}>
                  <div className="flex items-baseline justify-between">
                    <span className="text-[13px]" style={{ color: C.bone }}>{r.label}</span>
                    <span className="font-mono text-[11px]" style={{ color: r.tier >= 0 ? C.gold : C.ashDim }}>{r.tier >= 0 ? TIERS[r.tier] : "Building"}{r.hasData ? "" : " · est"}</span>
                  </div>
                  <div className="mt-1 flex items-center gap-2">
                    <div className="h-1.5 flex-1 overflow-hidden rounded-full" style={{ background: "#2A2418" }}>
                      <div className="h-full rounded-full" style={{ width: `${r.prog * 100}%`, background: r.tier >= 2 ? C.sage : C.gold, transition: "width .4s ease" }} />
                    </div>
                    <span className="font-mono text-[10px]" style={{ color: C.ash }}>{dispW(r.pair, unit)} {uw(unit)} · {r.ratio.toFixed(2)}×</span>
                  </div>
                  <p className="mt-0.5 font-mono text-[9px]" style={{ color: C.ashDim }}>
                    {r.nextTier ? `${r.nextTier} at ${dispW(r.nextTargetPair, unit)} ${uw(unit)} pair (≈${dispW(r.nextTargetPair / 2, unit)}/hand)` : "top tier reached"}
                    {r.ceiling ? ` · exceeds ${dispW(90, unit)} ${uw(unit)}/hand — rep & tempo work from here` : ""}
                  </p>
                </div>
              ))}
              <p className="font-mono text-[9px] leading-relaxed" style={{ color: C.ashDim }}>load = both DBs ÷ bodyweight at an est. 5-rep max · directional (the book's numbers are barbell-based) · the back/chin standard needs a pull-up bar, so it isn't tracked</p>
            </div>
          )}

          <div className="mt-5 border-t pt-4" style={{ borderColor: C.edge }}>
            <span className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}>Lean-waist standard (optional)</span>
            {body.waist && body.height ? (
              <p className="mt-2 font-mono text-[10px]" style={{ color: C.ash }}>waist {Math.round(waistPct * 100)}% of height · <span style={{ color: waistTier >= 0 ? C.gold : C.ashDim }}>{waistTier >= 0 ? TIERS[waistTier] : "above Good"}</span> <span style={{ color: C.ashDim }}>(Good ≤47 · Great ≤46 · Godlike ≤45%)</span></p>
            ) : (
              <p className="mt-2 font-mono text-[9px]" style={{ color: C.ashDim }}>add height + waist in the <span style={{ color: C.gold }}>Diet</span> tab for the lean-waist standard</p>
            )}
          </div>
        </div>
        </>)}

        {tab === "diet" && (
          <DietView mem={mem} unit={unit} logFood={logFood} removeEntry={removeEntry} addFood={addFood} removeFood={removeFood} setSteps={setSteps} addWater={addWater} removeWaterEntry={removeWaterEntry} setSleepToday={setSleepToday} setSleepDefault={setSleepDefault} setNutGoals={setNutGoals} setBody={setBody} logBW={logBW} />
        )}

        {/* shared cross-device sync (app-wide, both tabs) */}
        {CIPHER_ACTIVE ? (
          syncLocked ? (
            <SyncLock onUnlock={unlockSync} msg={syncMsg} />
          ) : (
            <div className="mt-6 flex items-center justify-between rounded-2xl border px-5 py-3" style={{ background: C.card, borderColor: C.edge }}>
              <div className="flex flex-col">
                <span className="font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: C.ash }}>Cross-device sync</span>
                <span className="mt-0.5 flex items-center gap-1.5 font-mono text-[10px]" style={{ color: C.sage }}><Check size={11} /> {syncMsg && /error|fail|offline|wrong/i.test(syncMsg) ? <span style={{ color: C.rust }}>{syncMsg}</span> : (syncMsg || "on · auto")}</span>
                <span className="mt-0.5 font-mono text-[9px]" style={{ color: C.ashDim }}>build {BUILD}</span>
              </div>
              <button onClick={forceSync} className="flex items-center gap-1.5 rounded-full border px-4 py-2 font-mono text-[11px] uppercase tracking-wider active:scale-95" style={{ borderColor: C.goldDim, color: C.gold }}><RefreshCw size={12} /> Refresh</button>
            </div>
          )
        ) : (
          <SyncPanel sync={sync} msg={syncMsg} log={syncLog} onConnect={connectSync} onDisconnect={disconnectSync} onSyncNow={syncNow} />
        )}

        <div className="mt-6 flex items-center justify-between border-t pt-5" style={{ borderColor: C.edge }}>
          <p className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.goldDim }}>v0.21 · live cross-device sync · github · lb / kg{!hasStore ? " · session-only here" : ""}</p>
          {confirm === "reset" ? (
            <span className="flex items-center gap-2 font-mono text-[10px] uppercase tracking-wider">
              <span style={{ color: C.rust }}>erase all history?</span>
              <button onClick={() => { setConfirm(null); resetMemory(); }} style={{ color: C.rust }}>yes</button>
              <button onClick={() => setConfirm(null)} style={{ color: C.ash }}>no</button>
            </span>
          ) : (
            <button onClick={() => setConfirm("reset")} className="flex items-center gap-1 font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}><RotateCcw size={11} /> reset</button>
          )}
        </div>
      </div>
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
