/* ─────────────── random no-repeat order, fresh cues first ─────────────── */
function buildOrder(cues, recentIdx) {
  const idx = cues.map((_, i) => i);
  for (let i = idx.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [idx[i], idx[j]] = [idx[j], idx[i]]; }
  const recent = new Set(recentIdx || []);
  return [...idx.filter((i) => !recent.has(i)), ...idx.filter((i) => recent.has(i))];
}

};
async function loadState() { return LS.get(KEY); }

// Optional cross-device sync — stores one JSON file in your own GitHub repo. Last-write-wins by timestamp
// (single-user assumption). cfg = { repo:"owner/name", token, path:"data.json", branch:"main" }. Never synced itself.
const b64enc = (str) => btoa(unescape(encodeURIComponent(str)));
const b64dec = (b) => decodeURIComponent(escape(atob(String(b).replace(/\n/g, ""))));
const ghHeaders = (cfg) => ({ Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28" });
const REMOTE = {
  async pull(cfg) {
    const r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch || "main"}&t=${Date.now()}`, { headers: ghHeaders(cfg), cache: "no-store" });
    if (r.status === 404) return { empty: true, sha: null, ts: 0, data: null };
    if (!r.ok) throw new Error("read " + r.status);
    const j = await r.json();
    let parsed = null; try { parsed = JSON.parse(b64dec(j.content)); } catch (e) {}
    return { sha: j.sha, ts: parsed?.ts || 0, data: parsed?.data || null };
  },
  async push(cfg, data, sha) {
    const mk = (s) => ({ method: "PUT", headers: { ...ghHeaders(cfg), "Content-Type": "application/json" }, body: JSON.stringify({ message: `coach sync ${new Date().toISOString()}`, content: b64enc(JSON.stringify({ ts: Date.now(), data })), branch: cfg.branch || "main", ...(s ? { sha: s } : {}) }) });
    let r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`, mk(sha));
    if (r.status === 409 || r.status === 422) { const cur = await this.pull(cfg); r = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`, mk(cur.sha)); }
    if (!r.ok) throw new Error("write " + r.status);
    const j = await r.json();
    return j.content?.sha || null;
  },
};

/* ─────────────── build sets ─────────────── */
function buildSets(ex, exIndex, w) {
  const sets = [];
  const mk = (kind, label, load, prefill, repsLabel, rest, range) => ({ kind, label, load, repsNum: prefill, repsLabel, rest, range });
  if (exIndex === 0 && ex.type === "rpt")
    [[0.6, 5, 120], [0.75, 3, 120], [0.9, 1, 180]].forEach(([p, r, rest], k) => sets.push(mk("warmup", `W${k + 1}`, nearest(w * p), r, String(r), rest, null)));
  else if (exIndex === 1 && ex.type === "rpt")
    sets.push(mk("warmup", "W1", nearest(w * 0.6), 4, "4", 90, null));   // second compound: one quick ramp to prime cold joints
  if (ex.type === "rpt")
    rptLoads(w).forEach((ld, k) => { const [bot, top] = ex.ranges[k]; sets.push(mk("work", `${k + 1}`, ld, ex.reps[k], `${bot}–${top}`, ex.rest, [bot, top])); });
  else { const [bot, top] = parseRange(ex.range); for (let k = 0; k < ex.sets; k++) sets.push(mk("work", `${k + 1}`, w, top, `${bot}–${top}`, ex.rest, [bot, top])); }
  return sets;
}

function Stepper({ value, onStep, minW = 30, disabled, label = "value", fmt }) {
  const timer = useRef(null);
  const start = (d) => {
    if (disabled) return;
    onStep(d);
    let delay = 380;
    const rep = () => { onStep(d); delay = Math.max(60, delay - 40); timer.current = setTimeout(rep, delay); };
    timer.current = setTimeout(rep, delay);
  };
  const stop = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  useEffect(() => () => stop(), []);
  return (
    <div className="inline-flex select-none items-center rounded-lg border" style={{ borderColor: C.edge, background: "#100E09", opacity: disabled ? 0.45 : 1 }}>
      <button aria-label={`decrease ${label}`} onPointerDown={() => start(-1)} onPointerUp={stop} onPointerLeave={stop} onPointerCancel={stop} className="flex h-9 w-9 touch-none items-center justify-center active:scale-90" style={{ color: C.bone }}><Minus size={16} /></button>
      <span className="px-1 text-center font-mono text-[15px] font-bold" style={{ color: C.bone, minWidth: minW }}>{fmt ? fmt(value) : value}</span>
      <button aria-label={`increase ${label}`} onPointerDown={() => start(1)} onPointerUp={stop} onPointerLeave={stop} onPointerCancel={stop} className="flex h-9 w-9 touch-none items-center justify-center active:scale-90" style={{ color: C.bone }}><Plus size={16} /></button>
    </div>
  );
}

// Typable numeric field (decimals allowed) with optional +/- nudges. For free body measurements only,

function NumberField({ value, onChange, step = 1, label, width = 58, placeholder }) {
  const [txt, setTxt] = useState("");
  const focused = useRef(false);
  useEffect(() => { if (!focused.current) setTxt(value ? String(value) : ""); }, [value]);
  const commit = (raw) => { if (raw === "" || raw === ".") { onChange(0); return; } const v = parseFloat(raw); if (!isNaN(v) && v >= 0) onChange(Math.round(v * 100) / 100); };
  const nudge = (d) => { const base = parseFloat(txt); const v = Math.max(0, Math.round(((isNaN(base) ? 0 : base) + d) * 100) / 100); setTxt(String(v)); onChange(v); };
  return (
    <div className="inline-flex items-center rounded-lg border" style={{ borderColor: C.edge, background: "#100E09" }}>
      <button aria-label={`decrease ${label}`} onClick={() => nudge(-step)} className="flex h-9 w-8 items-center justify-center active:scale-90" style={{ color: C.bone }}><Minus size={15} /></button>
      <input type="text" inputMode="decimal" aria-label={label} placeholder={placeholder || "—"} value={txt}
        onFocus={() => { focused.current = true; }}
        onChange={(e) => setTxt(e.target.value.replace(/[^0-9.]/g, ""))}
        onBlur={() => { focused.current = false; commit(txt); }}
        onKeyDown={(e) => { if (e.key === "Enter") { commit(txt); e.currentTarget.blur(); } }}
        className="bg-transparent text-center font-mono text-[15px] font-bold outline-none placeholder:opacity-40" style={{ color: C.bone, width }} />
      <button aria-label={`increase ${label}`} onClick={() => nudge(step)} className="flex h-9 w-8 items-center justify-center active:scale-90" style={{ color: C.bone }}><Plus size={15} /></button>
    </div>
  );
}

const ProgressChart = React.memo(function ProgressChart({ mem }) {
  const [sel, setSel] = useState(ALL_EX[0].name);
  const ex = ALL_EX.find((e) => e.name === sel);
  const rp = ex.repProgress;
  const pref = mem.unit || "lb";
  const D = (v) => (rp ? v : dispW(v, pref));                 // convert weights for display; reps pass through
  const unit = rp ? " reps" : ` ${uw(pref)}`;
  const hist = (mem.history?.[ex.name]) || [];
  const w0 = rp ? (hist.length ? hist[hist.length - 1].r : parseRange(ex.range)[0]) : (mem.weights?.[ex.name] ?? baseWeight(ex));
  const nowMs = Date.now();
  const histPts = hist.map((h) => ({ week: Math.round((new Date(h.t).getTime() - nowMs) / (7 * 864e5)), w: rp ? h.r : h.w, r: h.r }));

  // calibrate the forecast to how YOU actually progress: linear fit on logged weight vs time,
  // blended with the program's expected pace until you've logged enough to trust your own slope
  const core = ex.type === "rpt"; const bookR0 = core ? 1.75 : 0.8, tau = core ? 18 : 16;
  const reg = new Map(); histPts.forEach((p) => reg.set(p.week, p.w)); reg.set(0, w0);
  const pts = [...reg.entries()].map(([week, w]) => ({ week, w }));
  let r0 = bookR0, personalized = false;
  if (pts.length >= 2) {
    const n = pts.length;
    const sx = pts.reduce((s, p) => s + p.week, 0), sy = pts.reduce((s, p) => s + p.w, 0);
    const sxx = pts.reduce((s, p) => s + p.week * p.week, 0), sxy = pts.reduce((s, p) => s + p.week * p.w, 0);
    const den = n * sxx - sx * sx;
    let slope = den !== 0 ? (n * sxy - sx * sy) / den : 0;     // lb/hand per week, from YOUR data
    slope = Math.max(0, Math.min(3, slope));                    // clamp out noise / deloads
    const span = Math.abs(Math.min(...pts.map((p) => p.week)));
    const conf = Math.min(1, (n - 1) / 4) * Math.min(1, span / 6);  // trust grows with points + time
    r0 = conf * slope + (1 - conf) * bookR0;
    personalized = conf >= 0.34;
  }
  const gain = (t) => r0 * tau * (1 - Math.exp(-t / tau));

  const minW = Math.min(0, ...histPts.map((p) => p.week));
  const map = new Map();
  for (let wk = minW; wk <= 26; wk++) map.set(wk, { week: wk });
  for (let wk = 0; wk <= 26; wk++) map.get(wk).projected = Math.round((w0 + gain(wk)) * 10) / 10;
  histPts.forEach((p) => { const o = map.get(p.week) || { week: p.week }; o.actual = p.w; o.reps = p.r; map.set(p.week, o); });
  map.get(0).actual = w0;
  const data = [...map.values()].sort((a, b) => a.week - b.week).map((d) => ({ week: d.week, actual: d.actual != null ? D(d.actual) : undefined, projected: d.projected != null ? D(d.projected) : undefined, reps: d.reps }));

  const best = rp ? hist.reduce((b, h) => (!b || h.r > b.r ? h : b), null) : hist.reduce((b, h) => (!b || h.w > b.w || (h.w === b.w && h.r > b.r) ? h : b), null);
  const bestVal = best ? (rp ? best.r : best.w) : w0;
  const milestones = [[1, "1 wk"], [4, "1 mo"], [12, "3 mo"], [26, "6 mo"]].map(([wk, label]) => ({ label, val: rp ? Math.round(w0 + gain(wk)) : nearest(w0 + gain(wk)) }));

  return (
    <div className="mt-8 rounded-2xl border p-5" style={{ background: C.card, borderColor: C.edge }}>
      <div className="flex items-center justify-between">
        <span className="font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: C.ash }}>Progress & projection</span>
        <span className="flex items-center gap-3 font-mono text-[9px]" style={{ color: C.ashDim }}>
          <span className="flex items-center gap-1"><span style={{ width: 14, height: 2, background: C.gold, display: "inline-block" }} />logged</span>
          <span className="flex items-center gap-1"><span style={{ width: 14, borderTop: `2px dotted ${C.goldDim}`, display: "inline-block" }} />forecast</span>
        </span>
      </div>

      <div className="mt-3 flex gap-1.5 overflow-x-auto pb-1" style={{ scrollbarWidth: "none" }}>
        {ALL_EX.map((e) => (
          <button key={e.name} onClick={() => setSel(e.name)} className="shrink-0 rounded-full border px-3 py-1.5 font-mono text-[11px] whitespace-nowrap"
            style={{ borderColor: sel === e.name ? C.goldDim : C.edge, background: sel === e.name ? "#241F12" : "transparent", color: sel === e.name ? C.gold : C.ash }}>
            {SHORT[e.name]}
          </button>
        ))}
      </div>

      <div className="mt-4 flex items-end justify-between">
        <div>
          <p className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}>best lift</p>
          <p className="font-mono text-2xl font-bold leading-none" style={{ color: C.bone }}>
            {D(bestVal)}<span className="text-sm font-normal" style={{ color: C.ash }}>{unit}</span>
            {best ? (rp ? null : <span className="text-sm font-normal" style={{ color: C.ash }}> × {best.r} reps</span>) : <span className="text-xs font-normal" style={{ color: C.ashDim }}> · no logs yet</span>}
          </p>
        </div>
        <div className="text-right">
          <p className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}>now</p>
          <p className="font-mono text-lg font-bold leading-none" style={{ color: C.gold }}>{D(w0)}<span className="text-xs font-normal" style={{ color: C.ash }}>{unit}</span></p>
        </div>

      <div className="mt-4" style={{ height: 200, width: "100%" }}>
        <ResponsiveContainer>

            <XAxis dataKey="week" type="number" domain={[minW, 26]} tick={{ fill: C.ashDim, fontSize: 10, fontFamily: "monospace" }} tickFormatter={(v) => (v === 0 ? "now" : `${v}w`)} stroke="#2A2418" />

          </LineChart>

      <div className="mt-3 grid grid-cols-4 gap-2">

    </div>

      <span className="font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: C.ash }}>Sync across devices</span>
      <p className="mt-2 text-[12.5px] leading-relaxed" style={{ color: C.ash }}>Keeps one JSON file in your own GitHub repo so every device shares the same data. {sync ? <span style={{ color: C.sage }}>connected to {sync.repo}</span> : "not connected — this device is local-only."}</p>
      <div className="mt-3 space-y-2">
        <div><p className={lbl} style={{ color: C.ashDim }}>repo (owner/name)</p><input value={f.repo} onChange={(e) => setF({ ...f, repo: e.target.value.trim() })} placeholder="dima/workout-data" autoCapitalize="off" autoCorrect="off" spellCheck="false" className="mt-1 w-full rounded-lg px-3 py-2 font-mono text-[12px] outline-none" style={base} /></div>
        <div><p className={lbl} style={{ color: C.ashDim }}>fine-grained token (contents: read & write)</p><input value={f.token} onChange={(e) => setF({ ...f, token: e.target.value.trim() })} type="password" placeholder="github_pat_…" autoCapitalize="off" autoCorrect="off" spellCheck="false" className="mt-1 w-full rounded-lg px-3 py-2 font-mono text-[12px] outline-none" style={base} /></div>
        <div className="flex gap-2">
          <div className="flex-1"><p className={lbl} style={{ color: C.ashDim }}>file path</p><input value={f.path} onChange={(e) => setF({ ...f, path: e.target.value.trim() })} autoCapitalize="off" autoCorrect="off" spellCheck="false" className="mt-1 w-full rounded-lg px-3 py-2 font-mono text-[12px] outline-none" style={base} /></div>
          <div className="w-24"><p className={lbl} style={{ color: C.ashDim }}>branch</p><input value={f.branch} onChange={(e) => setF({ ...f, branch: e.target.value.trim() })} autoCapitalize="off" autoCorrect="off" spellCheck="false" className="mt-1 w-full rounded-lg px-3 py-2 font-mono text-[12px] outline-none" style={base} /></div>
        </div>
      </div>
      <div className="mt-3 flex flex-wrap gap-2">
        <button onClick={() => onConnect(f)} disabled={!f.repo || !f.token} className="rounded-full px-4 py-2 font-mono text-[11px] font-bold uppercase tracking-wider active:scale-95" style={{ background: f.repo && f.token ? C.gold : C.card, color: f.repo && f.token ? C.bg : C.ashDim, opacity: f.repo && f.token ? 1 : 0.5 }}>{sync ? "Reconnect" : "Connect"}</button>
        {sync && <button onClick={onSyncNow} className="rounded-full border px-4 py-2 font-mono text-[11px] uppercase tracking-wider active:scale-95" style={{ borderColor: C.edge, color: C.ash }}>Sync now</button>}
        {sync && <button onClick={onDisconnect} className="rounded-full border px-4 py-2 font-mono text-[11px] uppercase tracking-wider active:scale-95" style={{ borderColor: C.edge, color: C.ashDim }}>Disconnect</button>}
      </div>
      {msg && <p className="mt-2 font-mono text-[10px]" style={{ color: C.ash }}>{msg}</p>}
      <p className="mt-3 font-mono text-[9px] leading-relaxed" style={{ color: C.ashDim }}>the token is saved only on this device and never written into the repo. use a fine-grained token limited to this one repo, contents: read &amp; write. reading is automatic; saving happens a few seconds after changes.</p>
    </div>
  );
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [mem, setMem] = useState(DEFAULT);
  const [tag, setTag] = useState("A");
  const [sync, setSync] = useState(null);          // {url,key,code} or null
  const [syncMsg, setSyncMsg] = useState("");       // human-readable status
  const pushTimer = useRef(null);
  const memRef = useRef(DEFAULT);
  const liveRef = useRef(null);
  const shaRef = useRef(null);
  const syncReady = useRef(false);
  const quietRef = useRef(0);   // suppress push echoes right after adopting a remote copy
  const now = new Date();
  const today = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  // load memory once
  useEffect(() => {
    let alive = true;
    (async () => {
      const s = hasStore ? await loadState() : null;
      if (!alive) return;
      const m = s || DEFAULT;
      setMem(m); memRef.current = m;
      setTag(m.lastTag ? (m.lastTag === "A" ? "B" : "A") : "A");
      const live = hasStore ? await loadLive() : null;
      const liveOk = live && Array.isArray(live.done) && (live.done.length > 0 || live.active);
      if (liveOk && Date.now() - (live.ts || 0) < 86400000) { setPending(live); liveRef.current = live; }
      // cross-device sync: adopt remote if it's newer than this device, else seed remote from local
      const cfg = hasStore ? await loadSyncCfg() : null;
      if (cfg && cfg.repo && cfg.token) {
        setSync(cfg);
        try {
          const res = await REMOTE.pull(cfg);
          const lt = await localTs();
          if (res.data && (res.ts || 0) > lt) { await applyBlob(res.data, res.sha, res.ts, true); }
          else { shaRef.current = res.sha || null; const blob = { mem: m, live: liveOk ? live : null }; const ns = await REMOTE.push(cfg, blob, shaRef.current); shaRef.current = ns || shaRef.current; }
          if (alive) setSyncMsg("synced · " + new Date().toLocaleTimeString());
        } catch (e) { if (alive) setSyncMsg("offline — using this device's copy"); }
      }
      setLoaded(true);
      syncReady.current = true;   // only start auto-pushing after the initial reconcile
    })();
    return () => { alive = false; };
  }, []);

  // adopt a pulled {mem, live} blob into local state + storage
  const applyBlob = async (blob, sha, ts, setTagToo) => {
    const rmem = blob && blob.mem ? blob.mem : blob;                 // tolerate older mem-only files
    const rlive = blob && blob.mem ? blob.live : null;
    quietRef.current = Date.now() + 1800;
    shaRef.current = sha || shaRef.current;
    memRef.current = rmem; setMem(rmem);
    await LS.set(KEY, rmem); await LS.set(TSKEY, ts || Date.now());
    if (setTagToo) setTag(rmem.lastTag ? (rmem.lastTag === "A" ? "B" : "A") : "A");
    const liveOk = rlive && Array.isArray(rlive.done) && (rlive.done.length > 0 || rlive.active);
    if (liveOk) { liveRef.current = rlive; if (hasStore) await LS.set(LIVE, rlive); setPending(rlive); }
    else { liveRef.current = null; if (hasStore) await LS.del(LIVE); setPending(null); }
  };

  const schedulePush = () => {
    if (!sync || !syncReady.current || Date.now() < quietRef.current) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async () => {
      try { setSyncMsg("saving…"); const sh = await REMOTE.push(sync, { mem: memRef.current, live: liveRef.current }, shaRef.current); shaRef.current = sh || shaRef.current; await LS.set(TSKEY, Date.now()); setSyncMsg("saved · " + new Date().toLocaleTimeString()); }
      catch (e) { setSyncMsg("save failed — kept on device"); }
    }, 3500);
  };

  useEffect(() => { memRef.current = mem; schedulePush(); }, [mem]);

  // returning to the app pulls whatever the other device left
  useEffect(() => {
    if (!sync) return;
    const onFocus = async () => {
      try { const res = await REMOTE.pull(sync); const lt = await localTs(); if (res.data && (res.ts || 0) > lt) { await applyBlob(res.data, res.sha, res.ts, false); setSyncMsg("pulled latest · " + new Date().toLocaleTimeString()); } else { shaRef.current = res.sha || shaRef.current; } } catch (e) {}
    };
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") onFocus(); });
    return () => window.removeEventListener("focus", onFocus);
  }, [sync]);

  const connectSync = async (cfg) => {
    await saveSyncCfg(cfg); setSync(cfg); shaRef.current = null; setSyncMsg("connecting…");
    try {
      const res = await REMOTE.pull(cfg);
      const lt = await localTs();
      if (res.data && (res.ts || 0) > lt) { await applyBlob(res.data, res.sha, res.ts, true); setSyncMsg("connected · pulled cloud copy"); }
      else { shaRef.current = res.sha || null; const sh = await REMOTE.push(cfg, { mem: memRef.current, live: liveRef.current }, shaRef.current); shaRef.current = sh || null; setSyncMsg("connected · pushed this device"); }
      syncReady.current = true;
    } catch (e) { setSyncMsg("couldn't connect: " + e.message); }
  };
  const disconnectSync = async () => { await LS.del(SYNCKEY); setSync(null); shaRef.current = null; setSyncMsg(""); };
  const syncNow = async () => {
    if (!sync) return; setSyncMsg("syncing…");
    try {
      const res = await REMOTE.pull(sync);
      const lt = await localTs();
      if (res.data && (res.ts || 0) > lt) { await applyBlob(res.data, res.sha, res.ts, false); setSyncMsg("pulled latest · " + new Date().toLocaleTimeString()); }
      else { shaRef.current = res.sha || shaRef.current; const sh = await REMOTE.push(sync, { mem: memRef.current, live: liveRef.current }, shaRef.current); shaRef.current = sh || shaRef.current; await LS.set(TSKEY, Date.now()); setSyncMsg("pushed · " + new Date().toLocaleTimeString()); }
    } catch (e) { setSyncMsg("sync error: " + e.message); }
  };

  const plan = useMemo(() => {
    if (!loaded) return [];
    return WORKOUTS[tag].exercises.map((ex, i) => {
      let realEx = ex;
      if (ex.variantSlot) {
        const choice = mem[ex.slotKey + "Choice"] ?? 0;
        realEx = { ...ex.variants[choice], variantSlot: true, slotKey: ex.slotKey, variants: ex.variants, slotIndex: choice };
      }
      const w = mem.weights[realEx.name] ?? baseWeight(realEx);
      return { ex: realEx, w, sets: buildSets(realEx, i, w), order: buildOrder(realEx.cues, mem.recentCues[realEx.name]) };
    });
  }, [tag, mem, loaded]);

  const estMin = useMemo(() => { let t = 0; plan.forEach((it) => { it.sets.forEach((s) => { t += SET_EXEC + s.rest; }); t += TRANSITION; }); return Math.round(t / 60); }, [plan]);

  const [active, setActive] = useState(null);
  const [cue, setCue] = useState("");
  const [rest, setRest] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [done, setDone] = useState(() => new Set());
  const [logs, setLogs] = useState({});
  const [summary, setSummary] = useState(null);
  const [openInfo, setOpenInfo] = useState(null);
  const [confirm, setConfirm] = useState(null);   // null | "finish" | "reset"
  const [pending, setPending] = useState(null);    // saved in-progress session offered for resume
  const cursors = useRef({});
  const audioCtx = useRef(null);
  const skipNextReset = useRef(false);

  const primeAudio = () => { try { const AC = window.AudioContext || window.webkitAudioContext; if (AC) { const ctx = audioCtx.current || (audioCtx.current = new AC()); if (ctx.state === "suspended") ctx.resume(); } } catch (e) {} };
  const fireAlert = useCallback(() => {
    try { if (navigator.vibrate) navigator.vibrate([130, 70, 130]); } catch (e) {}
    try {
      const ctx = audioCtx.current; if (!ctx) return;
      const beep = (t, f) => { const o = ctx.createOscillator(), g = ctx.createGain(); o.type = "sine"; o.frequency.value = f; g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.35, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t + 0.34); };
      const t0 = ctx.currentTime; beep(t0, 880); beep(t0 + 0.4, 1175);
    } catch (e) {}
  }, []);

  useEffect(() => {
    if (skipNextReset.current) { skipNextReset.current = false; return; }
    const init = {};
    plan.forEach((it, ei) => it.sets.forEach((s, si) => { init[`${ei}-${si}`] = { weight: s.load, reps: s.repsNum }; }));
    setLogs(init); setActive(null); setCue(""); setRest(null); setDone(new Set()); cursors.current = {}; setOpenInfo(null);
  }, [plan]);

  const busy = active !== null || rest !== null;
  const sessionStarted = active !== null || rest !== null || done.size > 0;
  const setVariant = async (key, idx) => { const nm = { ...mem, [key + "Choice"]: idx }; if (hasStore) await saveState(nm); setMem(nm); };
  const workDoneCount = useMemo(() => [...done].length, [done]);

  const advance = useCallback(() => {
    if (!active) return;
    const exIdx = Number(active.split("-")[0]);
    const item = plan[exIdx];
    const n = cursors.current[exIdx] ?? 0;
    if (n >= item.order.length) { setCue(item.ex.cues[item.order[item.order.length - 1]]); return; }
    setCue(item.ex.cues[item.order[n]]);
    cursors.current[exIdx] = n + 1;
  }, [active, plan]);

  useEffect(() => { if (!active) return; advance(); const id = setInterval(advance, 12000); return () => clearInterval(id); }, [active, advance]);

  // clock-based rest: remaining is computed from an absolute end time, so a locked/backgrounded
  // screen can't desync it — on return to foreground we recompute and fire if it already elapsed.
  useEffect(() => {
    if (!rest) return;
    let stopped = false;
    const check = () => {
      if (stopped) return;
      const left = Math.round((rest.endAt - Date.now()) / 1000);
      if (left <= 0) { fireAlert(); setDone((d) => new Set(d).add(rest.key)); setRest(null); return; }
      setRestLeft(left);
    };
    check();
    const id = setInterval(check, 500);
    const onVis = () => { if (document.visibilityState === "visible") check(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("focus", onVis);
    return () => { stopped = true; clearInterval(id); document.removeEventListener("visibilitychange", onVis); window.removeEventListener("focus", onVis); };
  }, [rest, fireAlert]);

  // autosave the live session at each set boundary so a lock/refresh/device-switch can be resumed
  useEffect(() => {
    if (!loaded) return;
    const started = done.size > 0 || active !== null;
    const liveObj = started ? { tag, logs, done: [...done], active, ts: Date.now() } : (pending || null);
    liveRef.current = liveObj;
    if (hasStore && started) saveLive(liveObj);
    schedulePush();
  }, [done, active, loaded, pending]);

  const workKeys = useMemo(() => { const ks = []; plan.forEach((it, ei) => { if (it.ex.optional) return; it.sets.forEach((s, si) => { if (s.kind === "work") ks.push(`${ei}-${si}`); }); }); return ks; }, [plan]);
  const workTotal = workKeys.length;
  const workDone = useMemo(() => workKeys.filter((k) => done.has(k)).length, [workKeys, done]);

  const stepW = (key, d, set) => setLogs((L) => {
    const cur = L[key]?.weight ?? set.load;
    const nv = stepPlate(cur, d);
    const next = { ...L, [key]: { weight: nv, reps: L[key]?.reps ?? set.repsNum } };
    const [ei] = key.split("-").map(Number);
    const it = plan[ei];
    if (it && it.ex.type === "rpt" && set.kind === "work" && set.label === "1") {
      const work = it.sets.map((s, idx) => ({ s, idx })).filter((x) => x.s.kind === "work");
      const loads = rptLoads(nv);
      work.forEach(({ s, idx }, wi) => {
        if (wi === 0) return;
        const k2 = `${ei}-${idx}`;
        const curW = L[k2]?.weight ?? s.load;
        if (curW === s.load) next[k2] = { weight: loads[wi], reps: L[k2]?.reps ?? s.repsNum };  // only cascade sets you haven't hand-edited
      });
    }
    return next;
  });
  const stepR = (key, d, set) => setLogs((L) => { const cur = L[key]?.reps ?? set.repsNum; return { ...L, [key]: { weight: L[key]?.weight ?? set.load, reps: Math.max(0, cur + d) } }; });
  const startSet = (key) => { if (!busy) { primeAudio(); setActive(key); setOpenInfo(null); } };
  const finishSet = (set) => { const key = active; primeAudio(); setActive(null); setCue(""); setRestLeft(set.rest); setRest({ key, endAt: Date.now() + set.rest * 1000, total: set.rest }); setOpenInfo(null); };
  const skipRest = () => { setDone((d) => new Set(d).add(rest.key)); setRest(null); setOpenInfo(null); };
  const addRest = () => setRest((r) => (r ? { ...r, endAt: r.endAt + 30000, total: r.total + 30 } : null));
  const cancelSet = () => { setActive(null); setCue(""); setOpenInfo(null); };
  const undoSet = (key) => setDone((dn) => { const n = new Set(dn); n.delete(key); return n; });

  /* progression engine — reads what you actually did */
  const finishWorkout = async () => {
    const newWeights = { ...mem.weights };
    const newStalls = { ...(mem.stalls || {}) };
    const changes = [];
    plan.forEach((item, exIdx) => {
      const { ex, w, sets } = item;
      const work = sets.map((s, si) => ({ s, si })).filter((x) => x.s.kind === "work");
      let nw = w, deload = false;
      if (ex.type === "rpt") {
        const heavy = work[0]; const key = `${exIdx}-${heavy.si}`;
        if (done.has(key)) {
          const r = logs[key]?.reps ?? heavy.s.repsNum; const [bot, top] = heavy.s.range;
          if (r >= top) nw = stepPlate(w, 1); else if (r < bot) nw = stepPlate(w, -1);
          // stall watch: 3 sessions stuck at the same weight without reaching the top → deload ~10% and rebuild
          let st = newStalls[ex.name] || 0;
          if (nw !== w) st = 0;
          else { st += 1; if (st >= 3) { nw = stepPlate(w, -2); st = 0; deload = true; } }
          newStalls[ex.name] = st;
        }
      } else if (!ex.repProgress) {
        const keys = work.map((x) => `${exIdx}-${x.si}`);
        if (keys.every((k) => done.has(k))) {
          const reps = keys.map((k) => logs[k]?.reps ?? 0); const [bot, top] = work[0].s.range;
          if (Math.min(...reps) >= top) nw = stepPlate(w, 1); else if (reps[0] < bot) nw = stepPlate(w, -1);
        }
      }
      newWeights[ex.name] = nw;
      if (nw !== w) changes.push({ name: ex.name, from: w, to: nw, dir: nw > w ? "up" : "down", single: !!ex.single, deload });
    });

    const recentCues = { ...mem.recentCues };
    const newHistory = { ...(mem.history || {}) };
    const newSetHistory = { ...(mem.setHistory || {}) };
    const stamp = new Date().toISOString();
    plan.forEach((item, exIdx) => {
      const c = cursors.current[exIdx] ?? 0; recentCues[item.ex.name] = item.order.slice(0, c);
      const work = item.sets.map((s, si) => ({ s, si })).filter((x) => x.s.kind === "work");
      let rec = null;
      if (item.ex.type === "rpt") { const h = work[0]; const k = `${exIdx}-${h.si}`; if (done.has(k)) rec = { t: stamp, w: logs[k].weight, r: logs[k].reps }; }
      else { const ks = work.map((x) => `${exIdx}-${x.si}`).filter((k) => done.has(k)); if (ks.length) rec = { t: stamp, w: logs[ks[0]].weight, r: Math.max(...ks.map((k) => logs[k].reps)) }; }
      if (rec) newHistory[item.ex.name] = [...(newHistory[item.ex.name] || []), rec].slice(-40);
      // per-set progression history (work sets only)
      const sh = { ...(newSetHistory[item.ex.name] || {}) };
      work.forEach((x) => { const k = `${exIdx}-${x.si}`; if (done.has(k)) sh[x.s.label] = [...(sh[x.s.label] || []), { t: stamp, w: logs[k].weight, r: logs[k].reps }].slice(-30); });
      newSetHistory[item.ex.name] = sh;
    });
    const lastChanges = {}; changes.forEach((c) => { lastChanges[c.name] = c; });

    const newMem = { ...mem, version: 1, lastTag: tag, sessionCount: (mem.sessionCount || 0) + 1, weights: newWeights, recentCues, lastChanges, history: newHistory, setHistory: newSetHistory, stalls: newStalls };
    if (hasStore) { await saveState(newMem); await clearLive(); }
    setPending(null);
    setSummary({ tag, changes });
    setMem(newMem);
    setTag(tag === "A" ? "B" : "A");
    setOpenInfo(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const resumeSession = () => {
    if (!pending) return;
    if (pending.tag !== tag) { skipNextReset.current = true; setTag(pending.tag); }
    setLogs(pending.logs || {});
    setDone(new Set(pending.done || []));
    setPending(null);
  };
  const discardSession = async () => { if (hasStore) await clearLive(); setPending(null); };

  const setBody = async (patch) => { const body = { ...(mem.body || {}), ...patch }; const nm = { ...mem, body }; if (hasStore) await saveState(nm); setMem(nm); };
  const setUnit = async (u) => { const nm = { ...mem, unit: u }; if (hasStore) await saveState(nm); setMem(nm); };
  const logBW = async () => {
    const body = { ...(mem.body || {}) };
    if (!body.bw) return;
    const today = new Date().toISOString().slice(0, 10);
    const hist = (body.bwHist || []).filter((e) => e.t.slice(0, 10) !== today);
    body.bwHist = [...hist, { t: new Date().toISOString(), w: body.bw }].slice(-60);
    const nm = { ...mem, body }; if (hasStore) await saveState(nm); setMem(nm);
  };

  const resetMemory = async () => { if (hasStore) { await clearState(); await clearLive(); } setMem(DEFAULT); setTag("A"); setSummary(null); setPending(null); setConfirm(null); };

  const body = mem.body || {};
  const unit = mem.unit || "lb";
  const bw = body.bw || 0;
  const bwHist = body.bwHist || [];
  const bwDelta = (() => {
    if (bwHist.length < 2) return null;
    const last = bwHist[bwHist.length - 1].w;
    const cutoff = Date.now() - 30 * 864e5;
    const prior = [...bwHist].reverse().find((e) => new Date(e.t).getTime() <= cutoff) || bwHist[0];
    return Math.round((last - prior.w) * 10) / 10;
  })();
  const stdRows = STD.map((s) => {
    const ex = ALL_EX.find((e) => e.name === s.name);
    const hist = mem.history?.[s.name] || [];
    const bestE = hist.length ? Math.max(...hist.map((h) => e1rm(h.w, h.r))) : (ex ? e1rm(mem.weights?.[s.name] ?? baseWeight(ex), 5) : 0);
    const pair = fiveRM(bestE) * 2;
    const ratio = bw ? pair / bw : 0;
    let tier = -1; s.ratios.forEach((r, i) => { if (ratio >= r) tier = i; });
    const nextIdx = Math.min(tier + 1, 2);
    const top = tier >= 2;
    const prevRatio = tier >= 0 ? s.ratios[tier] : 0;
    const nextRatio = s.ratios[nextIdx];
    const prog = top ? 1 : Math.max(0, Math.min(1, (ratio - prevRatio) / (nextRatio - prevRatio)));
    const nextTargetPair = Math.round((bw ? nextRatio * bw : 0));
    return { name: s.name, label: s.label, pair: Math.round(pair), ratio, tier, prog, nextTier: top ? null : TIERS[nextIdx], nextTargetPair, ceiling: nextTargetPair / 2 > 90, hasData: hist.length > 0 };
  });
  const waistPct = body.waist && body.height ? body.waist / body.height : 0;
  let waistTier = -1; WAIST_STD.forEach((r, i) => { if (waistPct > 0 && waistPct <= r) waistTier = i; });

  if (!loaded) return (
    <div className="flex min-h-screen w-full items-center justify-center" style={{ background: C.bg }}>
      <span className="font-mono text-xs uppercase tracking-[0.2em]" style={{ color: C.ashDim }}>loading your program…</span>
    </div>
  );

  return (
    <div className="min-h-screen w-full" style={{ background: C.bg, color: C.bone }}>
      <style>{`@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
        @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

        .ggfig .ggarm,.ggfig .ggelbow,.ggfig .ggbody{animation-duration:2.2s;animation-timing-function:ease-in-out;animation-iteration-count:infinite;animation-direction:alternate}

        .extend .ggarm{transform:rotate(-82deg)}.extend .ggelbow{animation-name:faExtend}
        .pullover .ggarm{animation-name:uaPull}.pullover .ggelbow{transform:rotate(-6deg)}
        .hinge .ggbody{animation-name:bodyHinge}
        .fly .ggarm{animation-name:uaRaise}.fly .ggelbow{transform:rotate(-6deg)}.fly .ggbody{transform:rotate(44deg)}
        .calf .ggfig,.ggfig.calf{animation:calfBob 1.4s ease-in-out infinite alternate}

      <div className="mx-auto max-w-md px-5 pb-24 pt-8">

          <div className="mt-3 flex flex-wrap items-center gap-x-3 gap-y-2">
            <NumberField value={unit === "kg" ? Math.round((bw || 0) * KG * 10) / 10 : (bw || 0)} step={unit === "kg" ? 0.5 : 1} label="bodyweight" placeholder={unit === "kg" ? "kg" : "lb"}
              onChange={(disp) => setBody({ bw: unit === "kg" ? Math.round((disp / KG) * 100) / 100 : Math.round(disp * 100) / 100 })} />
            <span className="font-mono text-[11px]" style={{ color: C.ash }}>{uw(unit)}{bw ? ` · ${unit === "kg" ? Math.round(bw) + " lb" : lbToKg(bw) + " kg"}` : ""}</span>
            <button onClick={logBW} disabled={!bw} aria-label="log today's bodyweight" className="ml-auto rounded-full border px-3 py-1.5 font-mono text-[10px] uppercase tracking-wider active:scale-95" style={{ borderColor: C.edge, color: bw ? C.gold : C.ashDim, opacity: bw ? 1 : 0.5 }}>log today</button>
          </div>
          {bwDelta !== null && <p className="mt-1 font-mono text-[10px]" style={{ color: C.ashDim }}>{bwHist.length} weigh-ins · <span style={{ color: pctColor(bwDelta) }}>{bwDelta > 0 ? "+" : ""}{unit === "kg" ? Math.round(bwDelta * KG * 10) / 10 : bwDelta} {uw(unit)}</span> over ~30 days</p>}

          {!bw ? (
            <p className="mt-4 text-[12.5px] leading-relaxed" style={{ color: C.ash }}>Set your bodyweight to see where your lifts land against the Good / Great / Godlike standards — relative strength is the program's whole scorecard.</p>
          ) : (
            <div className="mt-4 space-y-3">
              {stdRows.map((r) => (
                <div key={r.name}>
                  <div className="flex items-baseline justify-between">
                    <span className="text-[13px]" style={{ color: C.bone }}>{r.label}</span>
                    <span className="font-mono text-[11px]" style={{ color: r.tier >= 0 ? C.gold : C.ashDim }}>{r.tier >= 0 ? TIERS[r.tier] : "Building"}{r.hasData ? "" : " · est"}</span>
                  </div>
                  <div className="mt-1 flex items-center gap-2">
                    <div className="h-1.5 flex-1 overflow-hidden rounded-full" style={{ background: "#2A2418" }}>
                      <div className="h-full rounded-full" style={{ width: `${r.prog * 100}%`, background: r.tier >= 2 ? C.sage : C.gold, transition: "width .4s ease" }} />
                    </div>
                    <span className="font-mono text-[10px]" style={{ color: C.ash }}>{dispW(r.pair, unit)} {uw(unit)} · {r.ratio.toFixed(2)}×</span>
                  </div>
                  <p className="mt-0.5 font-mono text-[9px]" style={{ color: C.ashDim }}>
                    {r.nextTier ? `${r.nextTier} at ${dispW(r.nextTargetPair, unit)} ${uw(unit)} pair (≈${dispW(r.nextTargetPair / 2, unit)}/hand)` : "top tier reached"}
                    {r.ceiling ? ` · exceeds ${dispW(90, unit)} ${uw(unit)}/hand — rep & tempo work from here` : ""}
                  </p>
                </div>
              ))}
              <p className="font-mono text-[9px] leading-relaxed" style={{ color: C.ashDim }}>load = both DBs ÷ bodyweight at an est. 5-rep max · directional (the book's numbers are barbell-based) · the back/chin standard needs a pull-up bar, so it isn't tracked</p>
            </div>
          )}

          <div className="mt-5 border-t pt-4" style={{ borderColor: C.edge }}>
            <span className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}>Lean-waist standard (optional)</span>
            <div className="mt-2 flex flex-wrap items-center gap-x-3 gap-y-2">
              <div className="flex items-center gap-1.5"><NumberField value={unit === "kg" ? Math.round((body.height || 0) * 2.54 * 10) / 10 : (body.height || 0)} step={unit === "kg" ? 1 : 0.5} label="height" placeholder={ulen(unit)} width={48}
                onChange={(disp) => setBody({ height: unit === "kg" ? Math.round((disp / 2.54) * 100) / 100 : Math.round(disp * 100) / 100 })} /><span className="font-mono text-[10px]" style={{ color: C.ashDim }}>{ulen(unit)} height</span></div>
              <div className="flex items-center gap-1.5"><NumberField value={unit === "kg" ? Math.round((body.waist || 0) * 2.54 * 10) / 10 : (body.waist || 0)} step={unit === "kg" ? 1 : 0.5} label="waist" placeholder={ulen(unit)} width={48}
                onChange={(disp) => setBody({ waist: unit === "kg" ? Math.round((disp / 2.54) * 100) / 100 : Math.round(disp * 100) / 100 })} /><span className="font-mono text-[10px]" style={{ color: C.ashDim }}>{ulen(unit)} waist</span></div>
            </div>
            {body.waist && body.height ? (
              <p className="mt-2 font-mono text-[10px]" style={{ color: C.ash }}>waist {Math.round(waistPct * 100)}% of height · <span style={{ color: waistTier >= 0 ? C.gold : C.ashDim }}>{waistTier >= 0 ? TIERS[waistTier] : "above Good"}</span> <span style={{ color: C.ashDim }}>(Good ≤47 · Great ≤46 · Godlike ≤45%)</span></p>
            ) : (
              <p className="mt-2 font-mono text-[9px]" style={{ color: C.ashDim }}>add height + waist ({ulen(unit)}) for the lean-waist standard</p>
            )}
          </div>
        </div>

        <div className="mt-6 flex items-center justify-between border-t pt-5" style={{ borderColor: C.edge }}>
          <p className="font-mono text-[10px] uppercase tracking-wider" style={{ color: C.goldDim }}>v0.21 · live cross-device sync · github · lb / kg{!hasStore ? " · session-only here" : ""}</p>
          {confirm === "reset" ? (
            <span className="flex items-center gap-2 font-mono text-[10px] uppercase tracking-wider">
              <span style={{ color: C.rust }}>erase all history?</span>
              <button onClick={() => { setConfirm(null); resetMemory(); }} style={{ color: C.rust }}>yes</button>
              <button onClick={() => setConfirm(null)} style={{ color: C.ash }}>no</button>
            </span>
          ) : (
            <button onClick={() => setConfirm("reset")} className="flex items-center gap-1 font-mono text-[10px] uppercase tracking-wider" style={{ color: C.ashDim }}><RotateCcw size={11} /> reset</button>
          )}
        </div>
      </div>
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
